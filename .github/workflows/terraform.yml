name: Terraform Basic

on:
#   push:
#     branches:
#       - main
  workflow_dispatch:   # 👈 YE ADD KAR (manual trigger)

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan